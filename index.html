<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Uai Pescados</title>
  <style>
    :root{--bg:#f4f6ff;--bg-soft:#eef2ff;--card:#ffffff;--text:#1f2450;--muted:#697089;--line:#d8def5;--primary:#2e3092;--primary2:#4648ab;--primary3:#1f2068;--nav:#21246b;--nav2:#31348b;--danger:#b42318;--success:#0f766e;--shadow:0 10px 30px rgba(46,48,146,.10)}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#f7f8ff 0%,#eef2ff 100%);color:var(--text)}
    .app{display:grid;grid-template-columns:280px 1fr;min-height:100vh}
    aside{background:linear-gradient(180deg,var(--nav) 0%,var(--primary3) 100%);color:#fff;padding:18px 16px;display:flex;flex-direction:column;gap:14px;box-shadow:18px 0 40px rgba(31,32,104,.18)}
    .brand-wrap{display:flex;align-items:center;gap:12px;padding:8px 6px 14px;border-bottom:1px solid rgba(255,255,255,.12)}
    .brand-logo{width:62px;height:62px;object-fit:contain;border-radius:16px;background:rgba(255,255,255,.98);padding:6px;box-shadow:0 10px 24px rgba(0,0,0,.18)}
    .brand{font-size:22px;font-weight:800;letter-spacing:.2px}.sub{font-size:12px;color:#d9defd}
    nav button,.toolbar button,.btn{border:0;border-radius:12px;padding:11px 14px;cursor:pointer;transition:.18s ease}
    .menu-section{margin-bottom:8px}
    .menu-section-title{width:100%;background:rgba(255,255,255,.08);color:#fff;text-align:left;margin-bottom:6px;font-weight:800;display:flex;align-items:center;justify-content:space-between;border:1px solid rgba(255,255,255,.08)}
    .menu-section-title:hover{background:rgba(255,255,255,.14)}
    .menu-section-items{padding-left:8px}
    nav button.menu-link{width:100%;background:transparent;color:#e7e9ff;text-align:left;margin-bottom:6px;border:1px solid transparent}
    nav button.menu-link:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.10)}
    nav button.active{background:linear-gradient(90deg,var(--primary2),var(--primary));color:#fff;box-shadow:0 8px 18px rgba(46,48,146,.28)}
    main{padding:18px}
    .topbar{display:none;position:sticky;top:0;z-index:20;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);padding:12px 14px;border-bottom:1px solid var(--line);align-items:center;gap:10px;border-radius:0 0 18px 18px}
    .menu-toggle{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;border:0;border-radius:10px;padding:9px 11px;box-shadow:var(--shadow)}
    .page-title{font-size:18px;font-weight:800}
    .grid{display:grid;gap:14px}.grid.cards{grid-template-columns:repeat(4,minmax(0,1fr))}.grid.two{grid-template-columns:1fr 1fr}
    .card{background:var(--card);border:1px solid rgba(216,222,245,.95);border-radius:18px;padding:16px;box-shadow:var(--shadow)}
    h2,h3{margin:0 0 12px} h3{font-size:16px}
    .muted{color:var(--muted);font-size:12px;font-weight:600}.kpi{font-size:26px;font-weight:800;color:var(--primary3)}
    label{display:block;font-size:13px;font-weight:800;margin:8px 0 6px;color:var(--primary3)}
    input,select,textarea{width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--text);outline:none}
    input:focus,select:focus,textarea:focus{border-color:var(--primary2);box-shadow:0 0 0 4px rgba(70,72,171,.12)}
    textarea{min-height:90px;resize:vertical}
    table{width:100%;border-collapse:collapse;font-size:14px} th,td{padding:10px;border-bottom:1px solid #e8ecfb;text-align:left;vertical-align:top} th{color:var(--primary3);font-size:12px;text-transform:uppercase;letter-spacing:.02em}
    .toolbar{display:flex;gap:8px;flex-wrap:wrap}.toolbar button,.btn{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;box-shadow:0 8px 18px rgba(46,48,146,.18)}.toolbar button:hover,.btn:hover{transform:translateY(-1px)} .btn.secondary{background:#6b7280}.btn.danger{background:var(--danger)}
    .row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.row-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.row-2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
    .list-actions{display:flex;gap:6px;flex-wrap:wrap}.pill{display:inline-block;padding:5px 10px;border-radius:999px;background:#eef2ff;color:var(--primary3);font-size:12px;font-weight:700}.right{text-align:right}
    .hidden{display:none !important}.warning{color:#92400e;background:#fffbeb;border:1px solid #fde68a;padding:10px;border-radius:12px}
    .mobile-backdrop{display:none}
    @media (max-width: 900px){.grid.cards{grid-template-columns:1fr 1fr}.row,.row-3,.row-2,.grid.two{grid-template-columns:1fr}.app{grid-template-columns:1fr}.topbar{display:flex} aside{position:fixed;left:-290px;top:0;bottom:0;width:278px;z-index:30;transition:left .2s ease;border-radius:0 18px 18px 0}.app.menu-open aside{left:0}.mobile-backdrop{display:none;position:fixed;inset:0;background:rgba(17,24,39,.38);z-index:25}.app.menu-open .mobile-backdrop{display:block} main{padding:12px}.brand-logo{width:54px;height:54px}.card{padding:14px;border-radius:16px}.kpi{font-size:22px} table{font-size:13px} th,td{padding:8px 6px}}
  </style>
</head>

  function recalcProductPurchaseMetrics(productId){
    var prod=byId(state.products,productId); if(!prod) return;
    var qtyTotal=0, valueTotal=0, latest=null;
    for(var i=0;i<state.purchases.length;i++){
      var pur=state.purchases[i];
      if(Number(pur.productId)===Number(productId)){
        qtyTotal += Number(pur.qty||0);
        valueTotal += Number(pur.qty||0) * Number(pur.costPrice||0);
        if(!latest || String(pur.date||'') > String(latest.date||'')) latest=pur;
      }
    }
    prod.purchaseQtyTotal = qtyTotal;
    prod.purchaseValueTotal = valueTotal;
    prod.avgCost = qtyTotal ? (valueTotal / qtyTotal) : 0;
    prod.cost = latest ? Number(latest.costPrice||0) : 0;
    var stock=0;
    for(var j=0;j<state.stockMoves.length;j++){
      var m=state.stockMoves[j];
      if(Number(m.productId)===Number(productId)){
        stock += (m.type==='entrada'?1:-1) * Number(m.qty||0);
      }
    }
    prod.stock = Math.max(0, stock);
  }

      acc.balance += (f.type==='entrada'?1:-1)*Number(f.value||0);
    }
  }

  function bindCadastro(key,fields){
    var f=document.getElementById('form_'+key); if(!f) return; f.onsubmit=async function(e){ e.preventDefault();
      var prefixes={customers:'CLI',suppliers:'FOR',employees:'FUN',institutions:'INS'};
      if(key==='customers'){
        try{
          await apiPost('/clientes',{ codigo: nextCode('CLI', state.customers), nome:f.elements.name.value, telefone:f.elements.phone.value, cidade:f.elements.city.value, limite_credito:Number(f.elements.creditLimit.value||0)||null, observacoes:f.elements.obs?f.elements.obs.value:'' });
          f.reset(); await syncRemoteCadastros(); current='customers';
        }catch(err){ alert(err.message||'Erro ao salvar cliente.'); }
        return;
      }
      if(key==='suppliers'){
        try{
          await apiPost('/fornecedores',{ codigo: nextCode('FOR', state.suppliers), nome:f.elements.name.value, telefone:f.elements.phone.value, cidade:f.elements.city.value, tipo:f.elements.type?f.elements.type.value:'', observacoes:f.elements.obs?f.elements.obs.value:'' });
          f.reset(); await syncRemoteCadastros(); current='suppliers';
        }catch(err){ alert(err.message||'Erro ao salvar fornecedor.'); }
        return;
      }
      var item={id:nextId(state[key]), code: nextCode(prefixes[key]||'CAD', state[key])};
      for(var i=0;i<fields.length;i++) item[fields[i]]=f.elements[fields[i]].value;
      state[key].push(item); save(); render();
    };
  }
  function bindProducts(){ var f=document.getElementById('form_products'); if(!f) return; f.onsubmit=async function(e){e.preventDefault(); var cost=Number(f.elements.cost.value||0), salePrice=Number(f.elements.salePrice.value||0); try{ var code=nextCode('PRO',state.products); await apiPost('/produtos',{ codigo: code, nome:f.elements.name.value, tipo:f.elements.type.value, unidade:'kg' }); await syncRemoteCadastros(); var p=null; for(var i=0;i<state.products.length;i++){ if(state.products[i].code===code){ p=state.products[i]; break; } } if(p){ p.cost=cost; p.avgCost=cost; p.salePrice=salePrice; p.stock=Number(p.stock||0); p.purchaseQtyTotal=Number(p.purchaseQtyTotal||0); p.purchaseValueTotal=Number(p.purchaseValueTotal||0); } save(); render(); }catch(err){ alert(err.message||'Erro ao salvar produto.'); } }; }

  function bindSales(){
    var f=document.getElementById('form_sales');
    if(!f) return;
    refreshSaleSummary();
    var watch=f.querySelectorAll('input,select');
    for(var w=0; w<watch.length; w++) watch[w].oninput=watch[w].onchange=refreshSaleSummary;
    var addItem=document.getElementById('addSaleItem');
    if(addItem) addItem.onclick=function(){ saleDraft().items.push({productId:'',qty:'',unitPrice:''}); render(); setPage('sales'); };
    var addPay=document.getElementById('addSalePay');
    if(addPay) addPay.onclick=function(){ saleDraft().payments.push({type:'dinheiro',value:'',accountId:'1',dueDate:'',number:'',bank:'',emitter:''}); render(); setPage('sales'); };
    var remItems=document.querySelectorAll('.remove-sale-item');
    for(var i=0;i<remItems.length;i++) remItems[i].onclick=function(){ var idx=Number(this.getAttribute('data-index')); saleDraft().items.splice(idx,1); if(!saleDraft().items.length) saleDraft().items.push({productId:'',qty:'',unitPrice:''}); render(); setPage('sales'); };
    var remPays=document.querySelectorAll('.remove-sale-pay');
    for(var j=0;j<remPays.length;j++) remPays[j].onclick=function(){ var idx=Number(this.getAttribute('data-index')); saleDraft().payments.splice(idx,1); if(!saleDraft().payments.length) saleDraft().payments.push({type:'dinheiro',value:'',accountId:'1'}); render(); setPage('sales'); };
    f.onsubmit=async function(e){
      e.preventDefault();
      var customerId=Number(f.elements.customerId.value||0);
      if(!customerId) return alert('Selecione o cliente.');
      var data=collectSaleForm(f);
      if(!data.items.length) return alert('Adicione pelo menos um item.');
      if(Math.abs(data.openAmount) > 0.009) return alert('A soma dos pagamentos precisa bater com o total da venda.');
      try{
        await apiPost('/vendas',{ codigo: nextCode('VEN', state.sales), customerId: customerId, date: f.elements.date.value, total: data.total, openAmount: 0, obs: f.elements.obs.value||'', items: data.items, payments: data.payments });
        for(var a=0;a<data.items.length;a++){
          var it=data.items[a], prod=byId(state.products,it.productId);
          if(prod){ prod.stock=Math.max(0, Number(prod.stock||0)-Number(it.qty||0)); }
          state.stockMoves.push({id:nextId(state.stockMoves),productId:it.productId,type:'saida',origin:'venda',qty:it.qty,cost:it.unitPrice,date:f.elements.date.value});
        }
        for(var b=0;b<data.payments.length;b++){
          var p=data.payments[b];
          if((p.type==='dinheiro' || p.type==='pix' || p.type==='cartao') && p.accountId){
            state.finance.push({id:nextId(state.finance),type:'entrada',category:'venda',partyName:customerName(customerId),accountId:Number(p.accountId),date:f.elements.date.value,value:Number(p.value||0),origin:'venda'});
          } else if(p.type==='boleto'){
            state.receivables.push({id:nextId(state.receivables), code: nextCode('REC', state.receivables), customerId:customerId, partyName:customerName(customerId), category:'boleto venda', originalValue:Number(p.value||0), openValue:Number(p.value||0), date:p.dueDate||f.elements.date.value, status:'aberto', origin:'venda'});
          }
        }
        uiState.saleDraft=null;
        await syncRemoteCadastros();
        save();
        alert('Venda salva com sucesso.');
        render(); setPage('sales');
      }catch(err){ alert(err.message||'Erro ao salvar venda.'); }
    };
  }

  function bindPurchases(){
    var f=document.getElementById('form_purchases');
    if(f){
      var recalcTotal=function(){
        var qty=Number(f.elements.qty.value||0), costPrice=Number(f.elements.costPrice.value||0);
        f.elements.totalValue.value = (qty*costPrice).toFixed(2);
      };
      if(f.elements.qty) f.elements.qty.oninput=recalcTotal;
      if(f.elements.costPrice) f.elements.costPrice.oninput=recalcTotal;
      f.onsubmit=function(e){
        e.preventDefault();
        var supplierId=Number(f.elements.supplierId.value||0), productId=Number(f.elements.productId.value||0), qty=Number(f.elements.qty.value||0), costPrice=Number(f.elements.costPrice.value||0), totalValue=Number(f.elements.totalValue.value||0), accountId=Number(f.elements.accountId.value||0);
        var paymentType=String(f.elements.paymentType.value||'a prazo'), dueDate=f.elements.dueDate.value||f.elements.date.value;
        if(!productId) return alert('Selecione o produto.');
        if(!supplierId) return alert('Selecione o fornecedor.');
        if(qty<=0) return alert('Informe a quantidade.');
        if(costPrice<=0) return alert('Informe o valor de custo.');
        if(totalValue<=0) totalValue = qty*costPrice;
        var prod=byId(state.products,productId);
        if(!prod) return;
        if(prod.type!=='revenda') return alert('Essa entrada manual é somente para produtos de terceiros/revenda.');
        prod.purchaseQtyTotal = Number(prod.purchaseQtyTotal||0) + qty;
        prod.purchaseValueTotal = Number(prod.purchaseValueTotal||0) + totalValue;
        prod.avgCost = prod.purchaseQtyTotal ? (prod.purchaseValueTotal / prod.purchaseQtyTotal) : 0;
        prod.cost = costPrice;
        prod.stock = Number(prod.stock||0) + qty;
        var purchaseId=nextId(state.purchases);
        var purchaseCode=nextCode('ENT', state.purchases);
        state.purchases.push({id:purchaseId,code:purchaseCode,supplierId:supplierId,date:f.elements.date.value,productId:productId,qty:qty,costPrice:costPrice,totalValue:totalValue,paymentType:paymentType,accountId:accountId,dueDate:dueDate,avgCostAfter:prod.avgCost,obs:f.elements.obs.value});
        state.stockMoves.push({id:nextId(state.stockMoves),purchaseId:purchaseId,productId:productId,type:'entrada',origin:'compra revenda',qty:qty,cost:costPrice,date:f.elements.date.value});
        state.payables.push({id:nextId(state.payables),purchaseId:purchaseId,partyName:supplierName(supplierId),category:'entrada mercadoria',originalValue:totalValue,openValue:(paymentType==='a vista'?0:totalValue),date:(paymentType==='a vista'?f.elements.date.value:dueDate),status:(paymentType==='a vista'?'pago':'aberto')});
        if(paymentType==='a vista'){
          if(!accountId) return alert('Escolha a conta de saída para pagamento à vista.');
          state.finance.push({id:nextId(state.finance),type:'saida',category:'entrada mercadoria',partyName:supplierName(supplierId),accountId:accountId,date:f.elements.date.value,value:totalValue,origin:'compra_revenda'});
        }
        save(); render(); setPage('purchases');
      };
    }
    var delBtns=document.querySelectorAll('.del-purchase');
    for(var i=0;i<delBtns.length;i++) delBtns[i].onclick=function(){
      var id=Number(this.getAttribute('data-id'));
      var purchase=byId(state.purchases,id); if(!purchase) return;
      if(!confirm('Excluir essa entrada de mercadoria?')) return;
      state.purchases = state.purchases.filter(function(x){ return Number(x.id)!==id; });
      state.stockMoves = state.stockMoves.filter(function(m){ return !(Number(m.purchaseId||0)===id || (m.origin==='compra revenda' && Number(m.productId)===Number(purchase.productId) && String(m.date||'')===String(purchase.date||'') && Number(m.qty||0)===Number(purchase.qty||0) && Number(m.cost||0)===Number(purchase.costPrice||0))); });
      state.payables = state.payables.filter(function(p){ return Number(p.purchaseId||0)!==id; });
      state.finance = state.finance.filter(function(fin){ return !(fin.origin==='compra_revenda' && Number(fin.accountId||0)===Number(purchase.accountId||0) && String(fin.date||'')===String(purchase.date||'') && Number(fin.value||0)===Number(purchase.totalValue||0) && String(fin.partyName||'')===String(supplierName(purchase.supplierId)||'')); });
      recalcProductPurchaseMetrics(purchase.productId);
      state.purchases.forEach(function(x){ if(Number(x.productId)===Number(purchase.productId)){ var prod=byId(state.products,purchase.productId); x.avgCostAfter = prod ? Number(prod.avgCost||0) : 0; } });
      save(); render(); setPage('purchases');
    };
  }
  function bindTransfers(){ var f=document.getElementById('form_transfers'); if(!f) return; f.onsubmit=function(e){ e.preventDefault(); var fromId=Number(f.elements.fromId.value), toId=Number(f.elements.toId.value), value=Number(f.elements.value.value||0); if(!fromId||!toId||fromId===toId) return alert('Escolha contas diferentes.'); state.transfers.push({id:nextId(state.transfers),fromId:fromId,toId:toId,date:f.elements.date.value,value:value}); state.finance.push({id:nextId(state.finance),type:'saida',category:'transferência',partyName:accountName(toId),accountId:fromId,date:f.elements.date.value,value:value,origin:'transferencia'}); state.finance.push({id:nextId(state.finance),type:'entrada',category:'transferência',partyName:accountName(fromId),accountId:toId,date:f.elements.date.value,value:value,origin:'transferencia'}); save(); render(); } }

  function bindReceivables(){
    var f=document.getElementById('form_receivables');
    if(f) f.onsubmit=function(e){
      e.preventDefault();
      var customerId=Number(f.elements.customerId.value||0), value=Number(f.elements.value.value||0), accountId=Number(f.elements.accountId.value||0);
      if(!customerId) return alert('Selecione o cliente.');
      if(value<=0) return alert('Informe o valor.');
      var receiveNow=f.elements.receiveNow.value==='sim';
      var rec={id:nextId(state.receivables), code: nextCode('REC', state.receivables), customerId:customerId, partyName:customerName(customerId), category:f.elements.category.value||'manual', originalValue:value, openValue: receiveNow?0:value, date:f.elements.dueDate.value||f.elements.date.value, status: receiveNow?'recebido':'aberto', origin:'manual', accountId: receiveNow?accountId:null, obs:f.elements.obs.value};
      state.receivables.push(rec);
      if(receiveNow){
        if(!accountId) return alert('Escolha a conta de entrada.');
        state.finance.push({id:nextId(state.finance),type:'entrada',category:rec.category,partyName:rec.partyName,accountId:accountId,date:f.elements.date.value,value:value,origin:'recebimento_manual'});
      }
      uiState.receivableSettleId=null;
      save(); render(); setPage('receivables');
    };
    var receiveBtns=document.querySelectorAll('.receive-receivable');
    for(var i=0;i<receiveBtns.length;i++) receiveBtns[i].onclick=function(){ uiState.receivableSettleId=Number(this.getAttribute('data-id')); render(); setPage('receivables'); };
    var settleForm=document.getElementById('form_receive_receivable');
    if(settleForm) settleForm.onsubmit=function(e){
      e.preventDefault();
      var rec=byId(state.receivables, Number(settleForm.elements.receivableId.value||0));
      if(!rec) return;
      var value=Number(settleForm.elements.value.value||0), accountId=Number(settleForm.elements.accountId.value||0), date=settleForm.elements.date.value||today();
      if(value<=0) return alert('Informe o valor recebido.');
      if(value>Number(rec.openValue||0)) return alert('O valor não pode ser maior que o em aberto.');
      if(!accountId) return alert('Escolha a conta de entrada.');
      state.finance.push({id:nextId(state.finance),type:'entrada',category:rec.category||'conta a receber',partyName:rec.partyName||customerName(rec.customerId),accountId:accountId,date:date,value:value,origin:'conta_receber',obs:settleForm.elements.obs.value||''});
      rec.openValue = Number((Number(rec.openValue||0)-value).toFixed(2));
      rec.status = rec.openValue<=0 ? 'recebido' : 'parcial';
      uiState.receivableSettleId=null;
      save(); render(); setPage('receivables');
    };
    var cancel=document.getElementById('cancelReceiveReceivable');
    if(cancel) cancel.onclick=function(){ uiState.receivableSettleId=null; render(); setPage('receivables'); };
  }
  function bindPayables(){
    var f=document.getElementById('form_payables');
    if(f){
      f.onsubmit=function(e){
        e.preventDefault();
        var t=f.elements.partyType.value, partyName='';
        if(t==='fornecedor') partyName=supplierName(Number(f.elements.supplierId.value||0));
        else if(t==='funcionario') partyName=(byId(state.employees, Number(f.elements.employeeId.value||0))||{}).name||'';
        else partyName=f.elements.otherName.value||'';
        var value=Number(f.elements.value.value||0), accountId=Number(f.elements.accountId.value||0), payNow=f.elements.payNow.value==='sim';
        if(!partyName) return alert('Informe o favorecido.');
        if(value<=0) return alert('Informe o valor.');
        var payable={id:nextId(state.payables), code: nextCode('PAG', state.payables), partyName:partyName, category:f.elements.category.value||'manual', originalValue:value, openValue:payNow?0:value, date:f.elements.dueDate.value||f.elements.date.value, status:payNow?'pago':'aberto', origin:'manual', obs:f.elements.obs.value};
        state.payables.push(payable);
        if(payNow){
          if(!accountId) return alert('Escolha a conta de saída.');
          state.finance.push({id:nextId(state.finance),type:'saida',category:payable.category,partyName:partyName,accountId:accountId,date:f.elements.date.value,value:value,origin:'pagamento_manual'});
        }
        uiState.payableSettleId=null;
        save(); render(); setPage('payables');
      };
    }
    var btns=document.querySelectorAll('.pay-payable');
    for(var i=0;i<btns.length;i++) btns[i].onclick=function(){ uiState.payableSettleId=Number(this.getAttribute('data-id')); render(); setPage('payables'); };
    var settleForm=document.getElementById('form_settle_payable');
    if(settleForm) settleForm.onsubmit=function(e){
      e.preventDefault();
      var p=byId(state.payables, Number(settleForm.elements.payableId.value||0));
      if(!p) return;
      var value=Number(settleForm.elements.value.value||0), accountId=Number(settleForm.elements.accountId.value||0), date=settleForm.elements.date.value||today();
      if(value<=0) return alert('Informe o valor pago.');
      if(value>Number(p.openValue||0)) return alert('O valor não pode ser maior que o em aberto.');
      if(!accountId) return alert('Escolha a conta de saída.');
      state.finance.push({id:nextId(state.finance),type:'saida',category:p.category||'conta a pagar',partyName:p.partyName,accountId:accountId,date:date,value:value,origin:'conta_pagar',obs:settleForm.elements.obs.value||''});
      p.openValue = Number((Number(p.openValue||0)-value).toFixed(2));
      p.status = p.openValue<=0 ? 'pago' : 'parcial';
      uiState.payableSettleId=null;
      save(); render(); setPage('payables');
    };
    var cancel=document.getElementById('cancelSettlePayable');
    if(cancel) cancel.onclick=function(){ uiState.payableSettleId=null; render(); setPage('payables'); };
  }

  function bindDeletes(){
    var lotBtns=document.querySelectorAll('.del-lot');
    for(var i=0;i<lotBtns.length;i++) lotBtns[i].onclick=function(){
      var id=Number(this.getAttribute('data-id'));
      var hasProd=state.productions.some(function(p){ return Number(p.lotId)===id; });
      if(hasProd) return alert('Esse lote possui produção vinculada. Exclua a produção primeiro.');
      if(!confirm('Excluir lote #'+id+'?')) return;
      state.lots=state.lots.filter(function(l){ return Number(l.id)!==id; });
      save(); render();
    };
    var prodBtns=document.querySelectorAll('.del-production');
    for(var j=0;j<prodBtns.length;j++) prodBtns[j].onclick=function(){
      var id=Number(this.getAttribute('data-id'));
      var prod=byId(state.productions,id); if(!prod) return;
      if(!confirm('Excluir produção #'+id+'?')) return;
      for(var k=0;k<prod.items.length;k++){
        var item=prod.items[k];
        var p=byId(state.products,item.productId);
        if(p){ p.stock=Math.max(0, Number(p.stock||0)-Number(item.qty||0)); }
      }
      state.stockMoves = state.stockMoves.filter(function(m){ return !(m.origin==='produção' && m.date===prod.date); });
      var lot=byId(state.lots,prod.lotId); if(lot) lot.status='disponível';
      state.productions=state.productions.filter(function(x){ return Number(x.id)!==id; });
      save(); render();
    };
  }

  document.getElementById('menuToggle').onclick=openMenu; document.getElementById('backdrop').onclick=closeMenu;
  document.getElementById('seedBtn').onclick=function(){ state=clone(defaultState); state.customers=[{id:1,name:'Cliente Exemplo',phone:'37 99999-0000',city:'Arcos',creditLimit:15000}]; state.suppliers=[{id:1,name:'Fornecedor Tilápia',type:'peixe_vivo',phone:'',city:'Arcos'}]; state.institutions=[{id:1,name:'Factoring Exemplo',type:'factoring'}]; state.products[0].stock=100; state.products[0].cost=25; state.products[1].stock=80; state.products[1].cost=24; save(); render(); };
  document.getElementById('resetBtn').onclick=function(){ if(confirm('Limpar todos os dados?')){ localStorage.removeItem(KEY); state=clone(defaultState); render(); } };
  syncRemoteCadastros().finally(function(){ render(); });
})();
